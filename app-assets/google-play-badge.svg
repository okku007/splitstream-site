    <path d="M0 24 L8 12 L20 12 Z" fill="#FFCE00"/>
  </g>
  <text x="48" y="21" fill="#FFFFFF" font-family="Roboto, Arial, sans-serif" font-size="8" letter-spacing="0.6">GET IT ON</text>
  <text x="47" y="41" fill="#FFFFFF" font-family="Roboto, Arial, sans-serif" font-weight="500" font-size="20">Google Play</text>
</svg>
