<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 54" width="182" height="54" role="img" aria-label="Get it on Google Play">
  <rect x="0.5" y="0.5" width="181" height="53" rx="8" fill="#000000" stroke="#A6A6A6" stroke-width="1"/>
  <g transform="translate(18,15)">
    <!-- Google Play triangle: 4 facets fanning from pivot Q(8,12) to A(0,0) M(0,12) B(0,24) T(20,12) -->
